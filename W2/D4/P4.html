<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Overlay : Dim Background</title>
            <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body>
    <main class=" max-w-4xl mx-auto p-6 space-y-8 bg-purple-300">
        <h1 class="text-2xl font-bold" >Overlay text background</h1>
        <section class="border rounded p-6 ">
            <div class="grid md:grid-cols-2 gap-6">
                <div class="h-32 rounded bg-[linear-gradient(135deg,#C23D29,#8AC229)]">Card 1</div>
                <div class="h-32 rounded bg-[linear-gradient(135deg,#C23D39,#8AC429)]">Card 2</div>
                <p class="mt-4 text-lg">This is a content behind overlay.</p>
            </div>
        </section>
        <div id="overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">
            <div class="w-[min(520px,p2vw)] bg-white rounded p-6 shadow-lg">
                <h2 class="text-lg font-bold">My Modal Window</h2>
                <p class="text-sm mt-2">here is my second modal window that i created.</p>
                <div class="mt-6 flex justify-end">
                 <button id="closeBtn" class="px-4 py-2 rounded border hover: bg-red-50 transtion">Close</button>
            </div>
            </div>
        </div>
        </div>
    </main>
    <script>
        const overlay = document.getElementById('overlay');
        const closeBtn = document.getElementById('closeBtn'); 

        closeBtn.addEventListener('click',function ()  {
            overlay.classList.toggle('hidden');
        });
        //Click outside of Modal to close it
        overlay.addEventListener("click", (e)=> {
            if(e.target === overlay) {
                overlay.classlist.remove("flex"); 
                overlay.classlist.add("hidden");
            }
    });
    </script>
</body>
</html>
