<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Notifications</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="flex items-start justify-center bg-green-100">

  <div class="w-full max-w-xl bg-white rounded-xl shadow-lg mt-10 p-5">
    
    <!-- Header -->
    <div class="flex items-center justify-between mb-4">
      <h1 class="text-2xl font-bold">Notification Center</h1>
      <span class="bg-blue-100 text-blue-900 text-sm font-semibold px-3 py-1 rounded-full">
        3 New
      </span>
    </div>

    <!-- Notifications -->
    <div class="space-y-3">
      <div class="flex flex-col gap-1 bg-red-200 border-l-4 border-red-600 p-4 rounded">
        <h2 class="font-bold">System Error</h2>
        <p class="text-sm font-medium">
          There was a problem processing your last request. Please try again later.
        </p>
      </div>

      <div class="flex flex-col gap-1 bg-blue-200 border-l-4 border-blue-600 p-4 rounded">
        <h3 class="font-bold">Update Available</h3>
        <p class="text-sm font-medium">
          A new dashboard update has been released with performance improvements.
        </p>
      </div>
    </div>

    <!-- Buttons -->
    <div class="flex justify-end gap-4 mt-6">
      <button class="bg-green-500 hover:bg-yellow-600 text-white px-5 py-2 rounded-lg">
        View All
      </button>
      <button class="border border-gray-400 px-5 py-2 rounded-lg hover:bg-green-300">
        Dismiss
      </button>
    </div>

  </div>

</body>
</html>
