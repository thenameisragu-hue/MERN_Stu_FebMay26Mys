<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> JS more examples</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <pre id="out">

    </pre>    
    <button id="runbtn" class="px-3 py-1 rounded-lg m-2 border bg-gray-700 text-white">Run</button>
 
    <script>
        const out =document.getElementById("out");
        function print(...args){

            console.log(...args);
            out.textContent+=args.join("")+"\n";
        }
        function clearOut(){
            out.textContent="";
        }
        function run(){
            //dynamic typing,concatenations,type conversion
            clearOut();
            let value = "10";
            print("value = ",value,"Typeof=",typeof value );

            value = 20;
            print("value = ",value,"Typeof=",typeof value );

            print("'10'+ 5: ","10"+5);
            print("'10'- 5: ","10"-5);//numeric conversion
            print("'10'==10: ","10"==10);//comparing values
             print("'10'===10: ","10"===10);//considering data types and compares values
             //Datatypes
             const underfval = undefined;
             const nullval = null;
             print("undefval = ",typeof underfval);
             print("nullval = ",nullval,"typeof: ",typeof nullval);
        }     
        document.getElementById("runbtn").addEventListener("click",run);
    </script>
</body>
</html>
