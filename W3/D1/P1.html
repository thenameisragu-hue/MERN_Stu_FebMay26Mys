<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Java Script Basics</title>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        
</head>
<body>
    <h1 class="text-2xl font-bold ">My first Java Script</h1>
    <button id="runbtn" class="px-3 py-1 rounded-lg m-2 border bg-gray-700 text-white">Run</button>
    <pre id="out">

    </pre>
    <script>
        const out =document.getElementById("out");
        // Function which accepts variable no. of arguments
        function print(...args){
            // Console is a temporary usage
            //Only used within development stage
            //For Debugging process to test code
            console.log(...args);
            out.textContent+=args.join("")+"\n";
        }
        function run(){       
        print("Hello from JavaScript");
        print("2+3=",2+3);
        document.body.style.background="#A3F714";
        }
        document.getElementById("runbtn").addEventListener("click",run);
    </script>
</body>
</html>
