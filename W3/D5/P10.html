<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Programmatic events </title>
</head>
<body>
    <button id="clickbtn">Programmatic click button</button>
    <button id="runclick">Run btn.click()</button>

    <div id="hoverbox" style="border: 1px solid red; width: 250px;">
        Mouseover Box
    </div>
    <input type="text" id="demoinput" placeholder="keyboard Target">
    <script src="./P10.js"></script>
</body>
